<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AL HIDAYA MANAGEMENT | A Complete HR Solutions</title>
  <meta name="description" content="Gulf Visa Services & Recruitment for White and Blue category jobs." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/hero.css" />
  <link rel="stylesheet" href="css/services.css" />
  <link rel="stylesheet" href="css/partner.css" />
  <link rel="stylesheet" href="css/featured.css" />
  <link rel="stylesheet" href="css/testimonials-new.css" />
  <link rel="stylesheet" href="css/trust.css" />
  <link rel="stylesheet" href="css/process.css" />
  <link rel="stylesheet" href="css/jobs.css" />
  <link rel="stylesheet" href="css/testimonials.css" />
  <link rel="stylesheet" href="css/apply.css" />
  <link rel="stylesheet" href="css/location.css" />
  <link rel="stylesheet" href="css/newsletter.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>

<body>

  

  <div id="hero-container"></div>
  <div id="services-container"></div>
  <div id="jobs-container"></div>
  <div id="process-container"></div>
  <div id="partner-container"></div>
  <div id="apply-container"></div>
  <div id="featured-container"></div>
  <div id="testimonials-new-container"></div>
  <div id="newsletter-container"></div>
  <div id="trust-container"></div>
  <div id="location-container"></div>
  <div id="vision-container"></div>
  <div id="mission-container"></div>
  <div id="footer-container"></div>

  <a class="floatBtn wa" target="_blank"
     href="https://wa.me/918853979030?text=Hello%20AL%20HIDAYA%20MANAGEMENT%2C%20I%20want%20to%20apply%20for%20a%20job."
     title="WhatsApp">WA</a>
  <a class="floatBtn call" href="tel:+918853979030" title="Call">Call</a>

  <script src="js/script.js"></script>
  <script>

    // ── NAVBAR (load first, then renderNav) ──
    fetch('navbar.html')
  .then(r => r.text())
  .then(html => {
    document.getElementById('navbar-container').innerHTML = html;
    renderNav();
  })
  .catch(e => console.error('Error loading navbar:', e));
    function renderNav() {
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      const nav = document.getElementById('navActions');
      if (!nav) return;
      if (user) {
        nav.innerHTML = `
          <span style="font-size:13px;font-weight:700;color:#1e1b4b;">👤 ${user.name}</span>
          ${user.role === 'admin' ? '<a class="btn ghost" href="admin.html">Admin Panel</a>' : ''}
          <button class="btn ghost" onclick="handleLogout()">Logout</button>
          <a class="btn primary" href="#apply">Apply Now</a>
        `;
      } else {
        nav.innerHTML = `
          <a class="btn ghost" href="login.html">Login</a>
          <a class="btn primary" href="signup.html">Sign Up</a>
          <a class="btn primary" href="#apply">Apply Now</a>
        `;
      }
    }

    function handleLogout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.reload();
    }

    // ── OTHER SECTIONS ──
    fetch('hero.html')
      .then(res => res.text())
      .then(html => {
        const container = document.getElementById('hero-container');
        container.innerHTML = html;
        container.querySelectorAll('script').forEach(oldScript => {
          const newScript = document.createElement('script');
          newScript.textContent = oldScript.textContent;
          document.body.appendChild(newScript);
        });
      })
      .catch(error => console.error('Error loading hero:', error));

    fetch('services.html')
      .then(res => res.text())
      .then(html => {
        var c = document.getElementById('services-container');
        c.innerHTML = html;
        c.querySelectorAll('script').forEach(function(s) {
          var n = document.createElement('script');
          n.textContent = s.textContent;
          document.body.appendChild(n);
        });
      })
      .catch(error => console.error('Error loading services:', error));

    fetch('jobs.html')
      .then(res => res.text())
      .then(html => {
        const c = document.getElementById('jobs-container');
        c.innerHTML = html;
        c.querySelectorAll('script').forEach(s => {
          const n = document.createElement('script');
          n.textContent = s.textContent;
          document.body.appendChild(n);
        });
      })
      .catch(error => console.error('Error loading jobs:', error));

    fetch('process.html')
      .then(res => res.text())
      .then(html => document.getElementById('process-container').innerHTML = html)
      .catch(error => console.error('Error loading process:', error));

    fetch('partner.html')
      .then(res => res.text())
      .then(html => document.getElementById('partner-container').innerHTML = html)
      .catch(error => console.error('Error loading partner:', error));

    fetch('featured.html')
      .then(res => res.text())
      .then(html => document.getElementById('featured-container').innerHTML = html)
      .catch(error => console.error('Error loading featured:', error));

    fetch('testimonials-new.html')
      .then(res => res.text())
      .then(html => document.getElementById('testimonials-new-container').innerHTML = html)
      .catch(error => console.error('Error loading testimonials-new:', error));

    fetch('newsletter.html')
      .then(res => res.text())
      .then(html => document.getElementById('newsletter-container').innerHTML = html)
      .catch(error => console.error('Error loading newsletter:', error));

    fetch('trust.html')
      .then(res => res.text())
      .then(html => document.getElementById('trust-container').innerHTML = html)
      .catch(error => console.error('Error loading trust:', error));

    fetch('apply.html')
      .then(res => res.text())
      .then(html => {
        const container = document.getElementById('apply-container');
        container.innerHTML = html;
        const script = document.createElement('script');
        script.textContent = container.querySelector('script').textContent;
        document.body.appendChild(script);
      })
      .catch(error => console.error('Error loading apply:', error));

    fetch('location.html')
      .then(res => res.text())
      .then(html => document.getElementById('location-container').innerHTML = html)
      .catch(error => console.error('Error loading location:', error));

    fetch('mission.html')
    .then(res => res.text())
    .then(html => document.getElementById('mission-container').innerHTML = html)
    .catch(error => console.error('Error loading mission:', error));

  fetch('vision.html')
    .then(res => res.text())
    .then(html => document.getElementById('vision-container').innerHTML = html)
    .catch(error => console.error('Error loading vision:', error));

  fetch('footer.html')
      .then(res => res.text())
      .then(html => document.getElementById('footer-container').innerHTML = html)
      .catch(error => console.error('Error loading footer:', error));

  </script>
</body>
</html>
