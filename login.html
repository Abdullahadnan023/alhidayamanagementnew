<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – AlHidaya</title>
  <link rel="stylesheet" href="css/navbar.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #3b3bb6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .authSec {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      overflow: hidden;
    }
    .authSec::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px);
      background-size: 38px 38px;
      opacity: .35;
      pointer-events: none;
    }
    .authWrap {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
    }
    .authHead {
      text-align: center;
      margin-bottom: 24px;
    }
    .authHead .logo {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
    }
    .authHead .logo span { color: #a5b4fc; }
    .authHead p {
      color: rgba(255,255,255,.75);
      font-size: 13px;
    }
    .authCard {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 30px 70px rgba(0,0,0,.25);
    }
    .authCardTop {
      background: #4f46e5;
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .authCardTop .title {
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .authCardTop .badge {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.18);
    }
    .authBody { padding: 28px 24px 24px; }
    .field {
      display: block;
      margin-bottom: 16px;
    }
    .field > span {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      outline: none;
      background: #fff;
      transition: border .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    .forgotRow {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 16px;
    }
    .forgotRow a {
      font-size: 12px;
      color: #4f46e5;
      font-weight: 700;
      text-decoration: none;
    }
    .submitBtn {
      width: 100%;
      border: none;
      background: #4f46e5;
      color: #fff;
      padding: 13px;
      border-radius: 10px;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(79,70,229,.26);
      transition: transform .15s, box-shadow .15s;
    }
    .submitBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 34px rgba(79,70,229,.32);
    }
    .submitBtn:disabled {
      opacity: .7;
      cursor: not-allowed;
      transform: none;
    }
    .divider {
      text-align: center;
      margin: 18px 0;
      font-size: 12px;
      color: #9ca3af;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: #e5e7eb;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .switchLink {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
    }
    .switchLink a {
      color: #4f46e5;
      font-weight: 800;
      text-decoration: none;
    }
    .errMsg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .successMsg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div id="navbar-container"></div>

  <section class="authSec">
    <div class="authWrap">
      <div class="authHead">
        <div class="logo">Al<span>Hidaya</span></div>
        <p>Welcome back! Please login to your account.</p>
      </div>

      <div class="authCard">
        <div class="authCardTop">
          <div class="title">🔐 Login to Your Account</div>
          <span class="badge">Secure</span>
        </div>
        <div class="authBody">
          <div class="errMsg" id="errMsg"></div>
          <div class="successMsg" id="successMsg"></div>

          <label class="field">
            <span>Email Address</span>
            <input type="email" id="loginEmail" placeholder="john@example.com" />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" id="loginPassword" placeholder="Enter your password" />
          </label>

          <div class="forgotRow">
            <a href="#">Forgot Password?</a>
          </div>

          <button class="submitBtn" id="loginBtn" onclick="handleLogin()">Login</button>

          <div class="divider">or</div>

          <div class="switchLink">
            Don't have an account? <a href="signup.html">Sign Up</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    fetch('navbar.html')
      .then(r => r.text())
      .then(html => document.getElementById('navbar-container').innerHTML = html)
      .catch(() => {});

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errMsg = document.getElementById('errMsg');
      const successMsg = document.getElementById('successMsg');
      const btn = document.getElementById('loginBtn');

      errMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (!email || !password) {
        errMsg.textContent = 'Please fill in all fields.';
        errMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          successMsg.textContent = 'Login successful! Redirecting...';
          successMsg.style.display = 'block';
          setTimeout(() => {
            if (data.user.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'index.html';
            }
          }, 1000);
        } else {
          errMsg.textContent = data.message || 'Invalid email or password.';
          errMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      } catch (err) {
        errMsg.textContent = 'Server error. Please try again.';
        errMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
