<section class="applySec" id="apply">
  <div class="container applyContainer">
    <div class="applyHead">
      <h2>Quick Application</h2>
      <p>
        Submit your profile to our database. Our team will match you with the best opportunities
        available.
      </p>
    </div>

    <div class="applyCard">
      <div class="applyCardTop">
        <div class="applyCardTitle">
          <span class="docIcon">📄</span>
          <span>Application Form</span>
        </div>
        <span class="fastTrack">Fast Track</span>
      </div>

      <div class="applyBody">
        <div class="applyCols">
          <!-- LEFT COL -->
          <div class="applyCol">
            <h4 class="applySub">PERSONAL DETAILS</h4>

            <label class="field">
              <span>Full Name</span>
              <input type="text" id="fullName" placeholder="John Doe" />
            </label>

            <label class="field">
              <span>Email Address</span>
              <input type="email" id="email" placeholder="john@example.com" />
            </label>

            <label class="field">
              <span>Phone Number (WhatsApp)</span>
              <div class="phoneRow">
                <select class="codeSelect" id="countryCode">
                  <option value="+91">+91</option>
                  <option value="+971">+971</option>
                  <option value="+966">+966</option>
                  <option value="+974">+974</option>
                  <option value="+968">+968</option>
                  <option value="+965">+965</option>
                </select>
                <input type="tel" id="phone" placeholder="50 123 4567" />
              </div>
            </label>

            <label class="field">
              <span>Years of Experience</span>
              <select id="experience">
                <option value="Fresher">Fresher</option>
                <option value="1-2 Years">1-2 Years</option>
                <option value="3-5 Years">3-5 Years</option>
                <option value="6-10 Years">6-10 Years</option>
                <option value="10+ Years">10+ Years</option>
              </select>
            </label>
          </div>

          <!-- RIGHT COL -->
          <div class="applyCol">
            <h4 class="applySub">PROFESSIONAL INFO</h4>

            <label class="field">
              <span>Target Country</span>
              <select id="targetCountry">
                <option value="">Select Country</option>
                <option value="Saudi Arabia">🇸🇦 Saudi Arabia</option>
                <option value="UAE">🇦🇪 United Arab Emirates</option>
                <option value="Qatar">🇶🇦 Qatar</option>
                <option value="Oman">🇴🇲 Oman</option>
                <option value="Kuwait">🇰🇼 Kuwait</option>
                <option value="Bahrain">🇧🇭 Bahrain</option>
                <option value="Jordan">🇯🇴 Jordan</option>
                <option value="Palestine">🇵🇸 Palestine</option>
                <option value="Egypt">🇪🇬 Egypt</option>
                <option value="Morocco">🇲🇦 Morocco</option>
                <option value="Iran">🇮🇷 Iran</option>
                <option value="Afghanistan">🇦🇫 Afghanistan</option>
                <option value="Pakistan">🇵🇰 Pakistan</option>
                <option value="India">🇮🇳 India</option>
                <option value="Bangladesh">🇧🇩 Bangladesh</option>
                <option value="Sri Lanka">🇱🇰 Sri Lanka</option>
                <option value="Malaysia">🇲🇾 Malaysia</option>
                <option value="Singapore">🇸🇬 Singapore</option>
                <option value="Thailand">🇹🇭 Thailand</option>
                <option value="Philippines">🇵🇭 Philippines</option>
                <option value="Indonesia">🇮🇩 Indonesia</option>
                <option value="Vietnam">🇻🇳 Vietnam</option>
                <option value="UK">🇬🇧 United Kingdom</option>
                <option value="Germany">🇩🇪 Germany</option>
                <option value="France">🇫🇷 France</option>
                <option value="Netherlands">🇳🇱 Netherlands</option>
                <option value="Sweden">🇸🇪 Sweden</option>
                <option value="Canada">🇨🇦 Canada</option>
                <option value="USA">🇺🇸 United States</option>
                <option value="Australia">🇦🇺 Australia</option>
                <option value="New Zealand">🇳🇿 New Zealand</option>
                <option value="Switzerland">🇨🇭 Switzerland</option>
                <option value="Italy">🇮🇹 Italy</option>
                <option value="Spain">🇪🇸 Spain</option>
                <option value="China">🇨🇳 China</option>
                <option value="Japan">🇯🇵 Japan</option>
              </select>
            </label>

            <!-- JOB ROLES SEARCH - Dynamic from API -->
            <div class="field">
              <span>Select Job Position</span>
              <div class="roleSearchWrap" id="roleSearchWrap">
                <div class="roleTagsBox" id="roleTagsBox">
                  <input
                    type="text"
                    id="roleSearchInput"
                    class="roleSearchInput"
                    placeholder="Search available jobs..."
                    autocomplete="off"
                  />
                </div>
                <div class="roleDropdown" id="roleDropdown"></div>
              </div>
            </div>

            <!-- Selected Job Display -->
            <div class="field" id="selectedJobDisplay" style="display: none;">
              <span>Selected Job</span>
              <div class="selectedJobCard" id="selectedJobCard">
                <!-- Will be filled dynamically -->
              </div>
            </div>

            <div class="field">
              <span>Upload CV / Resume</span>
              <label class="uploadBox">
                <input type="file" id="cvFile" hidden accept=".pdf,.doc,.docx" />
                <div class="uploadInner">
                  <div class="cloud">☁️</div>
                  <div class="uploadText">
                    <b>Click to upload</b> or drag and drop
                  </div>
                  <div class="uploadHint">PDF, DOC, DOCX (Max 5MB)</div>
                </div>
              </label>
              <div id="fileName" style="margin-top: 5px; font-size: 12px; color: #666;"></div>
            </div>
          </div>
        </div>

        <div class="applyFooter">
          <label class="agree">
            <input type="checkbox" id="agreeTerms" />
            <span>
              I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </span>
          </label>
          <button class="submitBtn" type="button" id="submitBtn">Submit Application</button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Message Display -->
<div id="messageContainer" style="margin-top: 20px;"></div>

<script>
  // ==================== STATE MANAGEMENT ====================
  let allJobs = [];
  let selectedJob = null;
  let selectedFile = null;
  
  // ==================== FETCH JOBS FROM BACKEND ====================
  async function fetchJobs() {
    try {
      const response = await fetch('http://localhost:5000/api/jobs');
      const data = await response.json();
      
      if (data.success && data.jobs) {
        allJobs = data.jobs;
        console.log('Jobs loaded:', allJobs.length);
      } else {
        console.error('No jobs found');
        allJobs = [];
      }
    } catch (error) {
      console.error('Error fetching jobs:', error);
      allJobs = [];
    }
  }

  // ==================== JOB SEARCH & DROPDOWN ====================
  const roleInput = document.getElementById('roleSearchInput');
  const roleDropdown = document.getElementById('roleDropdown');
  const selectedJobDisplay = document.getElementById('selectedJobDisplay');
  const selectedJobCard = document.getElementById('selectedJobCard');

  function renderJobDropdown(query) {
    const filtered = allJobs.filter(job => 
      job.title.toLowerCase().includes(query.toLowerCase()) ||
      job.company.toLowerCase().includes(query.toLowerCase())
    );

    roleDropdown.innerHTML = '';
    
    if (filtered.length === 0) {
      roleDropdown.innerHTML = '<div class="roleNoResult">No jobs found</div>';
    } else {
      filtered.forEach(job => {
        const div = document.createElement('div');
        div.className = 'roleOption';
        div.innerHTML = `
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
              <strong>${job.title}</strong><br>
              <small>${job.company} - ${job.location}</small>
            </div>
            <small style="color: #28a745;">${job.salary || 'Not specified'}</small>
          </div>
        `;
        div.addEventListener('mousedown', () => selectJob(job));
        roleDropdown.appendChild(div);
      });
    }
    roleDropdown.classList.add('open');
  }

  function selectJob(job) {
    selectedJob = job;
    
    // Update UI
    roleInput.value = job.title;
    selectedJobDisplay.style.display = 'block';
    
    // Create selected job card
    selectedJobCard.innerHTML = `
      <div style="background: #e8f5e9; padding: 10px; border-radius: 6px; border-left: 3px solid #28a745;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <strong>${job.title}</strong><br>
            <span style="font-size: 13px;">${job.company} • ${job.location}</span><br>
            <span style="font-size: 12px; color: #666;">${job.type} | ${job.salary || 'Salary not specified'}</span>
          </div>
          <button onclick="clearSelectedJob()" style="background: none; border: none; color: #666; cursor: pointer; font-size: 18px;">×</button>
        </div>
      </div>
    `;
    
    roleDropdown.classList.remove('open');
  }

  function clearSelectedJob() {
    selectedJob = null;
    roleInput.value = '';
    selectedJobDisplay.style.display = 'none';
    selectedJobCard.innerHTML = '';
  }

  // ==================== FILE UPLOAD HANDLING ====================
  const fileInput = document.getElementById('cvFile');
  const fileName = document.getElementById('fileName');
  const uploadBox = document.querySelector('.uploadBox');

  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      // Validate file size (5MB max)
      if (file.size > 5 * 1024 * 1024) {
        alert('File size should be less than 5MB');
        fileInput.value = '';
        fileName.textContent = '';
        selectedFile = null;
        return;
      }
      
      // Validate file type
      const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
      if (!validTypes.includes(file.type)) {
        alert('Please upload PDF, DOC, or DOCX file');
        fileInput.value = '';
        fileName.textContent = '';
        selectedFile = null;
        return;
      }
      
      selectedFile = file;
        // ✅ Show file name WITH a remove (×) button
      fileName.innerHTML = `
        <span style="display:inline-flex;align-items:center;gap:8px;background:#eef2ff;border:1.5px solid #c7d2fe;padding:6px 12px;border-radius:8px;font-size:12px;color:#4f46e5;font-weight:600;">
          📎 ${file.name}
          <button onclick="removeFile()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;line-height:1;padding:0;margin-left:2px;" title="Remove file">×</button>
        </span>
      `;
      // fileName.textContent = `📎 ${file.name}`;
    }
  });
function removeFile() {
    selectedFile = null;
    fileInput.value = '';
    fileName.innerHTML = '';
  }
  // Drag and drop handling
  uploadBox.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = '#28a745';
    uploadBox.style.backgroundColor = '#f0f9f0';
  });

  uploadBox.addEventListener('dragleave', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = '#ddd';
    uploadBox.style.backgroundColor = '';
  });

  uploadBox.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadBox.style.borderColor = '#ddd';
    uploadBox.style.backgroundColor = '';
    
    const file = e.dataTransfer.files[0];
    if (file) {
      fileInput.files = e.dataTransfer.files;
      const event = new Event('change', { bubbles: true });
      fileInput.dispatchEvent(event);
    }
  });

 // ==================== FORM SUBMISSION ====================
// ==================== FORM SUBMISSION ====================
document.getElementById('submitBtn').addEventListener('click', async function(e) {
  e.preventDefault();
  
  // Get form values
  const fullName = document.getElementById('fullName').value;
  const email = document.getElementById('email').value;
  const countryCode = document.getElementById('countryCode').value;
  const phone = document.getElementById('phone').value;
  const agreedToTerms = document.getElementById('agreeTerms').checked;
  
  // Validation
  if (!fullName || !email || !phone) {
    showMessage('Please fill all required fields', 'error');
    return;
  }
  
  if (!email.includes('@') || !email.includes('.')) {
    showMessage('Please enter a valid email address', 'error');
    return;
  }
  
  if (!selectedJob) {
    showMessage('Please select a job position', 'error');
    return;
  }
  
  if (!agreedToTerms) {
    showMessage('Please agree to Terms and Privacy Policy', 'error');
    return;
  }

  // Create FormData for file upload
  const formData = new FormData();
  formData.append('jobId', selectedJob._id);
  formData.append('name', fullName);
  formData.append('email', email);
  formData.append('phone', countryCode + ' ' + phone);
  formData.append('coverLetter', `Applying for ${selectedJob.title} position at ${selectedJob.company}. Experience: ${document.getElementById('experience').value}`);
  
  // Add file if selected
  if (selectedFile) {
    formData.append('cvFile', selectedFile);
  }

  // Show loading
  const btn = document.getElementById('submitBtn');
  const originalText = btn.textContent;
  btn.textContent = 'Submitting...';
  btn.disabled = true;

  try {
    const response = await fetch('http://localhost:5000/api/applications/apply', {
      method: 'POST',
      body: formData // Don't set Content-Type header, browser sets it automatically
    });

    const data = await response.json();

    if (data.success) {
      showMessage('✅ Application submitted successfully!', 'success');
      // Reset form
      document.getElementById('fullName').value = '';
      document.getElementById('email').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('agreeTerms').checked = false;
      document.getElementById('cvFile').value = '';
      document.getElementById('fileName').textContent = '';
      selectedFile = null;
      clearSelectedJob();
    } else {
      showMessage('❌ Error: ' + data.message, 'error');
    }
  } catch (error) {
    showMessage('❌ Network error. Please try again.', 'error');
    console.error('Error:', error);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
});

  // ==================== HELPER FUNCTIONS ====================
  function showMessage(text, type) {
    const container = document.getElementById('messageContainer');
    container.innerHTML = `
      <div style="
        padding: 15px;
        border-radius: 8px;
        background: ${type === 'success' ? '#4CAF50' : '#f44336'};
        color: white;
        text-align: center;
        margin-top: 20px;
      ">
        ${text}
      </div>
    `;
    
    setTimeout(() => {
      container.innerHTML = '';
    }, 5000);
  }

  // ==================== EVENT LISTENERS ====================
  roleInput.addEventListener('input', () => {
    if (roleInput.value.trim()) {
      renderJobDropdown(roleInput.value.trim());
    } else {
      roleDropdown.classList.remove('open');
    }
  });

  roleInput.addEventListener('focus', () => {
    renderJobDropdown(roleInput.value.trim());
  });

  document.addEventListener('click', (e) => {
    if (!document.getElementById('roleSearchWrap').contains(e.target)) {
      roleDropdown.classList.remove('open');
    }
  });

  // ==================== INITIALIZE ====================
  // Fetch jobs when page loads
  fetchJobs();

  // Add CSS for dropdown
  const style = document.createElement('style');
  style.textContent = `
    .roleDropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #ddd;
      border-radius: 4px;
      max-height: 250px;
      overflow-y: auto;
      display: none;
      z-index: 1000;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .roleDropdown.open {
      display: block;
    }
    .roleOption {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .roleOption:hover {
      background: #f5f5f5;
    }
    .roleNoResult {
      padding: 10px;
      color: #999;
      text-align: center;
    }
    .roleSearchWrap {
      position: relative;
    }
    .roleTagsBox {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 5px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .roleSearchInput {
      border: none;
      outline: none;
      flex: 1;
      min-width: 150px;
      padding: 5px;
    }
    .selectedJobCard {
      margin-top: 10px;
    }
    .uploadBox {
      display: block;
      padding: 20px;
      border: 2px dashed #ddd;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .uploadBox:hover {
      border-color: #28a745;
      background: #f9f9f9;
    }
    .cloud {
      font-size: 32px;
      margin-bottom: 10px;
    }
    .uploadText {
      margin-bottom: 5px;
    }
    .uploadHint {
      font-size: 12px;
      color: #999;
    }
  `;
  document.head.appendChild(style);
</script>
