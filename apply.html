<section class="applySec" id="apply">
  <div class="container applyContainer">
    <div class="applyHead">
      <h2>Quick Application</h2>
      <p>
        Submit your profile to our database. Our team will match you with the best opportunities
        available.
      </p>
    </div>

    <div class="applyCard">
      <!-- Card Header -->
      <div class="applyCardTop">
        <div class="applyCardTitle">
          <span class="docIcon">📄</span>
          <span>Application Form</span>
        </div>
        <span class="fastTrack">Fast Track</span>
      </div>

      <!-- Card Body -->
      <div class="applyBody">
        <div class="applyCols">
          <!-- LEFT COL -->
          <div class="applyCol">
            <h4 class="applySub">PERSONAL DETAILS</h4>

            <label class="field">
              <span>Full Name</span>
              <input type="text" placeholder="John Doe" />
            </label>

            <label class="field">
              <span>Email Address</span>
              <input type="email" placeholder="john@example.com" />
            </label>

            <label class="field">
              <span>Phone Number (WhatsApp)</span>
              <div class="phoneRow">
                <select class="codeSelect">
                  <option>+91</option>
                  <option>+971</option>
                  <option>+966</option>
                  <option>+974</option>
                  <option>+968</option>
                  <option>+965</option>
                </select>
                <input type="tel" placeholder="50 123 4567" />
              </div>
            </label>

            <label class="field">
              <span>Years of Experience</span>
              <select>
                <option>Fresher</option>
                <option>1-2 Years</option>
                <option>3-5 Years</option>
                <option>6-10 Years</option>
                <option>10+ Years</option>
              </select>
            </label>
          </div>

          <!-- RIGHT COL -->
          <div class="applyCol">
            <h4 class="applySub">PROFESSIONAL INFO</h4>

            <label class="field">
              <span>Target Country</span>
              <select>
                <option>Select Country</option>
                <option>🇸🇦 Saudi Arabia</option>
                <option>🇦🇪 United Arab Emirates</option>
                <option>🇶🇦 Qatar</option>
                <option>🇴🇲 Oman</option>
                <option>🇰🇼 Kuwait</option>
                <option>🇧🇭 Bahrain</option>
                <option>🇯🇴 Jordan</option>
                <option>🇵🇸 Palestine</option>
                <option>🇪🇬 Egypt</option>
                <option>🇲🇦 Morocco</option>
                <option>🇮🇷 Iran</option>
                <option>🇦🇫 Afghanistan</option>
                <option>🇵🇰 Pakistan</option>
                <option>🇮🇳 India</option>
                <option>🇧🇩 Bangladesh</option>
                <option>🇱🇰 Sri Lanka</option>
                <option>🇲🇾 Malaysia</option>
                <option>🇸🇬 Singapore</option>
                <option>🇹🇭 Thailand</option>
                <option>🇵🇭 Philippines</option>
                <option>🇮🇩 Indonesia</option>
                <option>🇻🇳 Vietnam</option>
                <option>🇬🇧 United Kingdom</option>
                <option>🇩🇪 Germany</option>
                <option>🇫🇷 France</option>
                <option>🇳🇱 Netherlands</option>
                <option>🇸🇪 Sweden</option>
                <option>🇨🇦 Canada</option>
                <option>🇺🇸 United States</option>
                <option>🇦🇺 Australia</option>
                <option>🇳🇿 New Zealand</option>
                <option>🇨🇭 Switzerland</option>
                <option>🇮🇹 Italy</option>
                <option>🇪🇸 Spain</option>
                <option>🇨🇳 China</option>
                <option>🇯🇵 Japan</option>
              </select>
            </label>

            <div class="field">
              <span>Job Roles</span>

              <div class="rolesGrid">
                <label class="chk"><input type="checkbox" /> <span>HR Manager</span></label>
                <label class="chk"><input type="checkbox" /> <span>Sales Exec</span></label>
                <label class="chk"><input type="checkbox" /> <span>Software Eng</span></label>
                <label class="chk"><input type="checkbox" /> <span>Accountant</span></label>
                <label class="chk"><input type="checkbox" /> <span>Admin Asst</span></label>
                <label class="chk"><input type="checkbox" /> <span>Project Mgr</span></label>
              </div>
            </div>

            <div class="field">
              <span>Upload CV / Resume</span>

              <label class="uploadBox">
                <input type="file" hidden />
                <div class="uploadInner">
                  <div class="cloud">☁️</div>
                  <div class="uploadText">
                    <b>Click to upload</b> or drag and drop
                  </div>
                  <div class="uploadHint">PDF, DOC, DOCX (Max 5MB)</div>
                </div>
              </label>
            </div>
          </div>
        </div>

        <div class="applyFooter">
          <label class="agree">
            <input type="checkbox" />
            <span>
              I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
            </span>
          </label>

          <button class="submitBtn" type="button">Submit Application</button>
        </div>
      </div>
    </div>
  </div>
</section>
